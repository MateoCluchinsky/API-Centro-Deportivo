# 1. Configuración de la conexión
spring.datasource.url=jdbc:mysql://localhost:3306/centro_deportivo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# 2. Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Magia de Hibernate (DDL-AUTO)
spring.jpa.hibernate.ddl-auto=update

# 4. Ver qué está pasando 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Clave secreta para firmar los tokens JWT (debe ser larga)
jwt.secret=MI_CLAVE_SECRETA_SUPER_SEGURA_CENTRO_DEPORTIVO_2026_API